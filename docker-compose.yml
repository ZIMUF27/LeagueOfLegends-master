version: "3.9"

services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: lol_postgres
    restart: unless-stopped

    ports:
      - "5433:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: league-of-legends-db

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
